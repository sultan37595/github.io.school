<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة الإدارة</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --main: #2c3e50; --accent: #8e44ad; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; direction: rtl; text-align: right; }
        .login-overlay { position: fixed; inset: 0; background: var(--main); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        header { background: var(--main); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--accent); }
        .container { max-width: 900px; margin: 20px auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border-right: 5px solid var(--accent); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; }
        button { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; }
        .file-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; background: #fafafa; margin-top: 5px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2 style="color: var(--main);">🏫 تسجيل الدخول</h2>
        <input type="text" id="userInp" placeholder="اسم المستخدم">
        <input type="password" id="passInp" placeholder="كلمة المرور">
        <button onclick="login()">دخول آمن</button>
        </div>
</div>

<div id="mainApp" style="display:none;">
    <header>
        <div><strong>نظام الإدارة المدرسية</strong> | مرحباً: <span id="userDisp"></span></div>
        <button onclick="location.reload()" style="width:auto; background:#c0392b;">خروج</button>
    </header>
    <div class="container">
        <div id="adminPanel" style="display:none;">
            <div class="card">
                <h3>👥 إضافة المعلمات</h3>
                <input type="text" id="tUser" placeholder="اسم المعلمة">
                <input type="password" id="tPass" placeholder="تعيين كلمة مرور">
                <button onclick="addTeacher()">إضافة معلمة للسحابة</button>
                <div id="tList"></div>
            </div>
            <div class="card">
                <h3>📤 إرسال ملف خاص</h3>
                <select id="tSelect"></select>
                <input type="text" id="fileName" placeholder="اكتبي اسم الملف أو الرابط">
                <button onclick="sendFile()">إرسال الآن</button>
            </div>
        </div>

        <div id="teacherPanel" style="display:none;">
            <div class="card">
                <h3>📩 الملفات الواصلة لكِ</h3>
                <div id="myFiles"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ ضعي بياناتك الحقيقية هنا من Firebase Console
const firebaseConfig = {
  apiKey: "AIzaSyAxj3fQiWQTavPhov6Vpro83_8P8cXQDL8",
  authDomain: "school-dab46.firebaseapp.com",
  projectId: "school-dab46",
  storageBucket: "school-dab46.firebasestorage.app",
  messagingSenderId: "901701645217",
  appId: "1:901701645217:web:d6e91d8c2e2d7e0b0bd1e0",
  measurementId: "G-TFLYRX40X5"
};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function login() {
        const u = document.getElementById('userInp').value.trim();
        const p = document.getElementById('passInp').value.trim();
        
        // الدخول المباشر لكِ كمديرة لحل مشكلة الخطأ
        if(u === "غادة سعود خشيم" && p === "8501") {
            showUI('admin', u);
        } else {
            // البحث عن المعلمة في السحابة
            const snap = await db.collection('teachers').where('user', '==', u).where('pass', '==', p).get();
            if(!snap.empty) {
                showUI('teacher', u);
            } else {
                alert('اسم المستخدم أو كلمة المرور غير صحيحة');
            }
        }
    }

    function showUI(role, name) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userDisp').innerText = name;
        if(role === 'admin') {
            document.getElementById('adminPanel').style.display = 'block';
            loadTeachers();
        } else {
            document.getElementById('teacherPanel').style.display = 'block';
            loadTeacherFiles(name);
        }
    }

    async function addTeacher() {
        const user = document.getElementById('tUser').value.trim();
        const pass = document.getElementById('tPass').value.trim();
        if(!user || !pass) return alert("يرجى تعبئة البيانات");
        await db.collection('teachers').add({ user, pass });
        document.getElementById('tUser').value = "";
        document.getElementById('tPass').value = "";
        loadTeachers();
        alert("تمت إضافة المعلمة بنجاح");
    }

    async function loadTeachers() {
        const snap = await db.collection('teachers').get();
        const list = document.getElementById('tList');
        const select = document.getElementById('tSelect');
        list.innerHTML = ''; select.innerHTML = '';
        snap.forEach(doc => {
            list.innerHTML += `<div class="file-item">👤 ${doc.data().user}</div>`;
            select.innerHTML += `<option value="${doc.data().user}">${doc.data().user}</option>`;
        });
    }

    async function sendFile() {
        const target = document.getElementById('tSelect').value;
        const name = document.getElementById('fileName').value;
        if(!name) return alert("يرجى كتابة اسم الملف");
        await db.collection('files').add({ target, name, date: new Date().toLocaleString('ar-SA') });
        document.getElementById('fileName').value = "";
        alert('تم إرسال الملف للمعلمة');
    }

    function loadTeacherFiles(me) {
        db.collection('files').where('target', '==', me).onSnapshot(snap => {
            const div = document.getElementById('myFiles');
            div.innerHTML = '';
            snap.forEach(doc => {
                div.innerHTML += `<div class="file-item">📄 ${doc.data().name} <small>(${doc.data().date})</small></div>`;
            });
        });
    }
</script>
</body>
</html>
