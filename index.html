<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الإدارة المدرسية</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --main: #2c3e50; --accent: #8e44ad; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; direction: rtl; }
        .login-overlay { position: fixed; inset: 0; background: var(--main); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        input[type="text"], input[type="password"], select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        header { background: var(--main); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-right: 5px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .file-item { display: flex; justify-content: space-between; background: #f9f9f9; padding: 10px; margin: 5px 0; border-radius: 5px; }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2 style="color:var(--main)">🏫 تسجيل دخول آمن</h2>
        <input type="text" id="userInp" placeholder="اسم المستخدم">
        <input type="password" id="passInp" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header>
        <div><strong>منصة القائدة</strong> | <span id="userDisp"></span></div>
        <button onclick="location.reload()" style="background:#c0392b; width:auto; padding:5px 15px;">خروج</button>
    </header>
    <div class="container">
        <div id="adminPanel" style="display:none;">
            <div class="card">
                <h3>👥 إضافة المعلمات</h3>
                <input type="text" id="tUser" placeholder="اسم المعلمة">
                <input type="password" id="tPass" placeholder="كلمة المرور">
                <button onclick="addTeacher()">حفظ المعلمة في السحابة</button>
                <div id="tList" style="margin-top:15px"></div>
            </div>
            <div class="card">
                <h3>📤 إرسال ملف خاص</h3>
                <select id="tSelect"></select>
                <input type="text" id="fileName" placeholder="اسم الملف أو الرابط">
                <button onclick="sendFile()" style="background:#27ae60">إرسال الآن</button>
            </div>
        </div>
        <div id="teacherPanel" style="display:none;">
            <div class="card">
                <h3>📩 صندوق ملفاتك الخاصة</h3>
                <div id="myFiles"></div>
            </div>
        </div>
    </div>
</div>

<script>
 const firebaseConfig = {
  apiKey: "AIzaSyAxj3fQiWQTavPhov6Vpro83_8P8cXQDL8",
  authDomain: "school-dab46.firebaseapp.com",
  projectId: "school-dab46",
  storageBucket: "school-dab46.firebasestorage.app",
  messagingSenderId: "901701645217",
  appId: "1:901701645217:web:d6e91d8c2e2d7e0b0bd1e0",
  measurementId: "G-TFLYRX40X5"
};
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function login() {
        const u = document.getElementById('userInp').value.trim();
        const p = document.getElementById('passInp').value.trim();
        
        if(u === "غادة سعود خشيم" && p === "8501") {
            showUI('admin', u);
        } else {
            const snap = await db.collection('teachers').where('user', '==', u).where('pass', '==', p).get();
            if(!snap.empty) showUI('teacher', u);
            else alert('البيانات غير صحيحة');
        }
    }

    function showUI(role, name) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userDisp').innerText = name;
        if(role === 'admin') {
            document.getElementById('adminPanel').style.display = 'block';
            loadTeachers();
        } else {
            document.getElementById('teacherPanel').style.display = 'block';
            loadTeacherFiles(name);
        }
    }

    async function addTeacher() {
        const user = document.getElementById('tUser').value;
        const pass = document.getElementById('tPass').value;
        if(!user || !pass) return;
        await db.collection('teachers').add({ user, pass });
        document.getElementById('tUser').value=''; document.getElementById('tPass').value='';
        loadTeachers();
        alert("تمت الإضافة للسحابة بنجاح");
    }

    async function loadTeachers() {
        const snap = await db.collection('teachers').get();
        const list = document.getElementById('tList');
        const select = document.getElementById('tSelect');
        list.innerHTML = ''; select.innerHTML = '';
        snap.forEach(doc => {
            list.innerHTML += `<div class="file-item">👤 ${doc.data().user}</div>`;
            select.innerHTML += `<option value="${doc.data().user}">${doc.data().user}</option>`;
        });
    }

    async function sendFile() {
        const target = document.getElementById('tSelect').value;
        const name = document.getElementById('fileName').value;
        if(!name) return;
        await db.collection('files').add({ target, name, date: new Date().toLocaleString('ar-SA') });
        document.getElementById('fileName').value = '';
        alert("تم توجيه الملف بنجاح");
    }

    function loadTeacherFiles(me) {
        db.collection('files').where('target', '==', me).onSnapshot(snap => {
            const div = document.getElementById('myFiles');
            div.innerHTML = '';
            snap.forEach(doc => {
                div.innerHTML += `<div class="file-item">📄 ${doc.data().name} <small>${doc.data().date}</small></div>`;
            });
        });
    }
</script>
</body>
</html>
